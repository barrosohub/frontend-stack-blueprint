name: Blueprint integrity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify blueprint integrity
        run: node scripts/check-blueprint.mjs

      - name: Validate DESIGN.md example
        run: npx --yes --package=@google/design.md@0.3.0 designmd lint templates/DESIGN.example.md
