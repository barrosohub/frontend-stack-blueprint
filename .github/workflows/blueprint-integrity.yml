name: Blueprint integrity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install repository tooling
        run: pnpm install --frozen-lockfile

      - name: Verify blueprint integrity
        run: pnpm check

      - name: Validate DESIGN.md example
        run: pnpm dlx @google/design.md@0.3.0 designmd lint templates/DESIGN.example.md
