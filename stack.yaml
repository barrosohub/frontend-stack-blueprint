# frontend-stack-blueprint/stack.yaml
# Machine-readable stack manifest for LLMs and tooling
# This file is the single source of truth for versions.

schema_version: "1.0"
blueprint_version: "1.9.0"
updated: "2026-07-13"

core:
  typescript:
    min: ">=5.9.0"
    current: "5.9.3"
    install: "typescript"
  react:
    min: ">=19.2.0"
    current: "19.2.4"
    install: "react react-dom"
    types: "@types/react @types/react-dom"
  routing:
    default: "tanstack-router"
    alternative: "react-router"
    tanstack_router:
      min: ">=1.0.0"
      install: "@tanstack/react-router @tanstack/router-devtools"
    react_router:
      min: ">=7.1.0"
      install: "react-router"

build:
  vite:
    min: ">=7.0.0"
    current: "7.3.1"
    install: "vite"
    plugins: "@vitejs/plugin-react"
    node_requires: ">=20.19.0 || >=22.12.0"

tooling:
  package_manager:
    default: "pnpm"
    alternative: "npm"
    note: "pnpm is the priority package manager. Use Corepack to provision it by default; npm remains compatible but secondary."
  runtime:
    default: "node"
    alternative: "bun"
    default_requires: ">=20.19.0 || >=22.12.0"
    note: "Node.js is the default runtime. Bun is an alternative runtime only and does not replace pnpm as the default package manager."
  pnpm:
    status: "priority"
    install: "corepack enable pnpm"
    add: "pnpm add <package>"
    add_dev: "pnpm add -D <package>"
    dlx: "pnpm dlx <package>@latest <command>"
    exec: "pnpm exec <command>"
  bun:
    status: "alternative"
    min: ">=1.0.0"
    note: "Alternative JavaScript runtime for projects that validate Bun compatibility."

test:
  vitest:
    min: ">=3.2.0"
    recommended: ">=4.0.0"
    install: "vitest @testing-library/react @testing-library/jest-dom"
  playwright:
    status: "required-for-user-facing-deployed-apps"
    min: ">=1.61.0"
    current: "1.61.1"
    install: "@playwright/test"
    note: "Run critical journeys against the production build. Match projects to the declared browser/runtime matrix and retain traces on first retry in CI."
  accessibility:
    target: "WCAG 2.2 Level AA"
    axe_playwright:
      current: "4.12.1"
      install: "@axe-core/playwright"
      note: "Automated checks are required for representative routes and states but never establish conformance without manual evaluation."
  network_mocking:
    msw:
      status: "capability-gated"
      current: "2.15.0"
      install: "msw"
      note: "Activate when the project consumes HTTP or GraphQL APIs. Reuse canonical handlers across integration and browser scenarios."
  component_platform:
    storybook:
      status: "optional-capability-gated"
      current: "10.5.0"
      install: "storybook @storybook/react-vite @storybook/addon-a11y"
      note: "Activate for shared design systems, reusable component platforms, or complex state matrices; not a base dependency."

quality:
  husky:
    install: "husky"
    init: "pnpm exec husky init"
  lint_staged:
    install: "lint-staged"
  eslint:
    install: "eslint @eslint/js typescript-eslint"
  prettier:
    install: "prettier"
  ci:
    status: "mandatory"
    install: "pnpm install --frozen-lockfile"
    required_checks: "typecheck lint test:unit build; test:e2e when the deployed-UI profile applies"
    note: "Husky is local feedback. CI is the authoritative protected-branch merge gate."

reliability:
  status: "mandatory-by-applicable-profile"
  policy: "stack/reliability.md"
  core_web_vitals:
    percentile: 75
    lcp_good_ms: 2500
    inp_good_ms: 200
    cls_good: 0.1
    note: "Evaluate mobile and desktop field data separately. Lab tools are regression signals, not field SLO proof."
  tooling:
    web_vitals:
      status: "optional-when-provider-does-not-collect"
      current: "5.3.0"
      install: "web-vitals"
    lighthouse_ci:
      status: "optional-budget-implementation"
      current: "0.15.1"
      install: "@lhci/cli"
  release:
    requirements: "immutable release identifier, preview smoke test, rollout plan, rollback runbook, owner"
  browser_policy:
    default: "Baseline Widely Available"
    exceptions: "feature detection, progressive enhancement, fallback, tests, documented rationale"

security:
  status: "mandatory"
  environment:
    public_prefix: "VITE_"
    validation: "Zod in src/config/env.ts"
    note: "All VITE_* values are client-visible and must never contain secrets."
  supply_chain:
    requirements: "single lockfile, frozen CI install, Dependabot, Dependency Review, CodeQL, secret scanning, minimum permissions, Actions pinned to full commit SHAs"
  browser:
    requirements: "CSP rollout, avoid injection sinks, sanitize untrusted rich content, Trusted Types when compatible"

api_boundaries:
  status: "mandatory-when-networked"
  client: "platform fetch"
  validation: "Zod"
  lifecycle: "AbortSignal plus finite timeout"
  retry: "bounded, idempotent operations only, normally owned by TanStack Query"
  note: "Do not add Axios without a concrete requirement that the platform fetch boundary cannot meet."

ui:
  radix:
    install: "@radix-ui/react-dialog @radix-ui/react-popover @radix-ui/react-select @radix-ui/react-tabs"
    note: "Install primitives individually as needed"
  shadcn_ui:
    status: "recommended"
    init: "pnpm dlx shadcn@latest init"
    note: "Copy-paste components, not an npm dependency"
  floating_ui:
    install: "@floating-ui/react"
  embla_carousel:
    install: "embla-carousel-react"
  cmdk:
    install: "cmdk"

styling:
  tailwind:
    min: ">=4.0.0"
    install: "tailwindcss @tailwindcss/vite"
  clsx:
    install: "clsx"
    note: "Always used with tailwind-merge via cn() helper"
  tailwind_merge:
    install: "tailwind-merge"
    note: "Resolves Tailwind class conflicts"
  motion:
    install: "motion"
    note: "Successor to framer-motion. Import from 'motion/react'"

design_system:
  design_md:
    status: "provisional-optional"
    spec_version: "alpha"
    current: "0.3.0"
    evaluated: "2026-07-13"
    file: "DESIGN.md"
    install: "@google/design.md@0.3.0"
    binary: "designmd"
    export: "designmd export --format css-tailwind DESIGN.md"
    note: "Optional project-level design contract for visual intent and source token values. Pin the CLI exactly while the specification is alpha; do not install or create the file without an explicit product design need."

forms:
  react_hook_form:
    install: "react-hook-form"
  zod:
    install: "zod @hookform/resolvers"

data_access:
  default: "prisma"
  note: "Prisma is the approved ORM default when server-side or edge data access is needed. Drizzle ORM remains under evaluation until it reaches v1 GA."
  prisma:
    status: "recommended-optional"
    min: ">=6.0.0"
    current: "6.18.0"
    install: "prisma @prisma/client"
    tooling: "prisma"
    note: "Recommended only when a project has backend, server-side, or edge runtime and needs ORM-backed relational data access. Do not install for purely static frontend apps. Cloudflare D1 is supported via the official Prisma D1 guide, but Prisma Migrate is not the default D1 workflow."

auth:
  better_auth:
    status: "recommended-optional"
    min: ">=1.0.0"
    current: "1.5.1"
    install: "better-auth"
    tooling: "@better-auth/cli"
    note: "Recommended when a project needs authentication. Requires a server-side runtime/auth handler and is not mandatory for public or static apps without login."

managed_services:
  neon:
    provider: "Neon"
    role: "database"
    engine: "postgres"
    status: "recommended-optional"
    evaluated: "2026-03-09"
    tooling: "neonctl"
    note: "Recommended when a project needs managed Postgres. `@neondatabase/serverless` is the preferred JS/edge integration only when the project actually needs direct JavaScript, serverless, or edge access."
  cloudflare_d1:
    provider: "Cloudflare D1"
    role: "database"
    engine: "sqlite"
    status: "recommended-optional"
    evaluated: "2026-03-09"
    tooling: "wrangler"
    note: "Recommended when a project needs Cloudflare-native serverless SQL with Workers or edge runtime. D1 has SQLite semantics, does not replace Postgres, and should not be added to purely static frontend apps."
  cloudflare_r2:
    provider: "Cloudflare R2"
    role: "object-storage"
    status: "recommended-optional"
    evaluated: "2026-03-09"
    tooling: "wrangler"
    note: "Recommended when a project needs object storage. Integrate via the S3-compatible API or Cloudflare bindings; no default npm package is mandated by this blueprint."
  cloudflare_kv:
    provider: "Cloudflare KV"
    role: "key-value-storage"
    status: "recommended-optional"
    evaluated: "2026-03-09"
    tooling: "wrangler"
    note: "Recommended when a project needs key-value storage for read-heavy or eventually consistent workloads in the Cloudflare ecosystem. It is not a relational or strongly consistent transactional store."
  resend:
    provider: "Resend"
    role: "transactional-and-marketing-email"
    status: "recommended-optional"
    evaluated: "2026-03-09"
    note: "Recommended when a project needs transactional email or audience/broadcast workflows. The `resend` SDK is the usual backend integration when email sending is required."

dates:
  date_fns:
    min: ">=4.1.0"
    install: "date-fns"
  date_fns_tz:
    install: "@date-fns/tz"
    note: "First-class timezone support via TZDate (date-fns v4+)"

state:
  zustand:
    status: "core"
    install: "zustand"
    note: "Primary client state manager. Lightweight, minimal boilerplate."
  tanstack_store:
    status: "under-evaluation"
    install: "@tanstack/store @tanstack/react-store"
    note: "Alpha (v0.x). Not GA yet. When v1 ships, TanStack Store becomes the priority state manager, replacing Zustand."
  tanstack_query:
    min: ">=5.60.0"
    install: "@tanstack/react-query @tanstack/react-query-devtools"

content:
  lexical:
    status: "primary"
    install: "lexical @lexical/react"
  prosemirror:
    status: "fallback"
    install: "prosemirror-state prosemirror-view prosemirror-model"
  shiki:
    install: "shiki"

advanced_capabilities:
  policy: "optional-capability-gated"
  evaluated: "2026-07-13"
  note: "Install only the packages required by an explicit product capability. These packages are not part of the base stack."
  markdown:
    react_markdown:
      min: ">=10.0.0"
      current: "10.1.0"
      install: "react-markdown"
    remark_gfm:
      min: ">=4.0.0"
      current: "4.0.1"
      install: "remark-gfm"
    rehype_sanitize:
      min: ">=6.0.0"
      current: "6.0.0"
      install: "rehype-sanitize"
  data_table:
    tanstack_table:
      min: ">=8.0.0"
      current: "8.21.3"
      install: "@tanstack/react-table"
  charts:
    recharts:
      min: ">=3.0.0"
      current: "3.9.2"
      install: "recharts"
  diagrams:
    mermaid:
      min: ">=11.0.0"
      current: "11.16.0"
      install: "mermaid"
  code_editor:
    codemirror:
      min: ">=6.0.0"
      current_view: "6.43.6"
      install: "@codemirror/state @codemirror/view @codemirror/commands @codemirror/language"
  terminal:
    xterm:
      min: ">=6.0.0"
      current: "6.0.0"
      install: "@xterm/xterm"
    node_pty:
      min: ">=1.0.0"
      current: "1.1.0"
      install: "node-pty"
      note: "Trusted desktop/server host only. Validate native ABI compatibility for every target."
  collaboration:
    yjs:
      min: ">=13.0.0"
      current: "13.6.31"
      install: "yjs"
  pdf:
    pdfjs:
      min: ">=6.0.0"
      current: "6.1.200"
      install: "pdfjs-dist"

i18n:
  formatjs:
    install: "react-intl"

observability:
  sentry:
    status: "recommended-optional"
    install: "@sentry/react"
    note: "Activate when a deployed application needs error operations and release correlation."
  opentelemetry:
    status: "capability-gated"
    install: "@opentelemetry/api @opentelemetry/sdk-trace-web"
    note: "Activate when frontend telemetry must correlate with distributed backend or edge traces."
  statsig:
    status: "capability-gated"
    install: "@statsig/react-bindings"
    note: "Activate for staged rollouts, experimentation, or dynamic configuration."

icons:
  default: "lucide"
  lucide:
    install: "lucide-react"
  phosphor:
    install: "@phosphor-icons/react"
  tabler:
    install: "@tabler/icons-react"

targets:
  browser:
    status: "default"
    policy: "Baseline Widely Available unless product evidence requires another matrix"
    note: "Document browser families/versions, mobile/desktop scope, progressive enhancement, test matrix, preview smoke, and rollback."
  cloudflare_pages:
    status: "priority-optional"
    type: "cloud-frontend-hosting"
    evaluated: "2026-03-09"
    tooling: "wrangler"
    note: "Default cloud frontend deployment target when a project needs frontend hosting and no provider is specified. Cloudflare data services such as D1, KV, or R2 remain optional and should only be added when the project also has edge or server-side runtime needs."
  vercel:
    status: "secondary-optional"
    type: "cloud-frontend-hosting"
    evaluated: "2026-03-09"
    tooling: "vercel"
    note: "Secondary cloud frontend deployment target when explicitly requested or when Cloudflare Pages is not a fit."
  electron:
    min: ">=33.0.0"
    install: "electron"
    tooling: "@electron-forge/cli"
  tauri:
    min: ">=2.10.0"
    note: "Requires Rust toolchain"
  pwa:
    install: "vite-plugin-pwa"

agent_contracts:
  status: "mandatory-for-agent-consumption"
  canonical: "agent-contract.json"
  profiles: "profiles/*.json"
  consumer_config: "blueprint.config.json"
  conformance: "node scripts/check-project-conformance.mjs --project <path>"
  evals: "evals/scenarios.json"
  generated_entrypoints: "node scripts/generate-agent-entrypoints.mjs --check"

banned:
  - { name: "any (type)", reason: "Use unknown + type guards" }
  - { name: "redux", reason: "Use Zustand" }
  - { name: "mobx", reason: "Use Zustand" }
  - { name: "styled-components", reason: "Use Tailwind CSS" }
  - { name: "emotion", reason: "Use Tailwind CSS" }
  - { name: "css-in-js (any)", reason: "Use Tailwind CSS" }
  - { name: "jest", reason: "Use Vitest" }
  - { name: "moment", reason: "Use date-fns" }
  - { name: "dayjs", reason: "Use date-fns" }
  - { name: "formik", reason: "Use React Hook Form + Zod" }
  - { name: "yup", reason: "Use Zod" }
  - { name: "class components", reason: "Use functional components" }
  - { name: "deep relative imports", reason: "Use @/* path aliases" }
